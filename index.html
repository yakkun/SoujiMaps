<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1f2d3d" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Souji Maps — 双耳マップ</title>
    <meta
      name="description"
      content="ヤマレコと OpenStreetMap を左右に並べて同期表示する比較ビューア"
    />

    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-logo" aria-hidden="true">⛰⛰</span>
      </div>
      <div class="search" role="search">
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="山・地名・駅名を検索"
          autocomplete="off"
          spellcheck="false"
          aria-label="山・地名・駅名を検索"
          aria-autocomplete="list"
          aria-controls="search-results"
          aria-expanded="false"
        />
        <ul
          class="search-results"
          id="search-results"
          role="listbox"
          aria-label="検索結果"
          hidden
        ></ul>
      </div>
      <div class="status" id="status" aria-live="polite">
        <span id="status-lat">—</span>,
        <span id="status-lng">—</span>
      </div>
      <nav class="controls" aria-label="地図操作">
        <button type="button" id="btn-locate" title="現在地に移動">
          📍 現在地
        </button>
        <button type="button" id="btn-copy-url" title="現在位置の共有URLをコピー">
          🔗 URLコピー
        </button>
        <button type="button" id="btn-clear-gpx" title="表示中のGPXをクリア" hidden>
          ✕ GPX
        </button>
        <a
          class="controls-link"
          href="https://github.com/yakkun/SoujiMaps"
          target="_blank"
          rel="noreferrer noopener"
          title="GitHub リポジトリを開く"
          aria-label="GitHub リポジトリを開く"
        >
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
      </nav>
    </header>

    <main class="split" id="split">
      <section class="pane" data-side="left" aria-label="ヤマレコ 地図">
        <div class="pane-header">
          <span class="pane-title">ヤマレコ</span>
          <a
            class="pane-link"
            href="https://www.yamareco.com/"
            target="_blank"
            rel="noreferrer noopener"
            >yamareco.com ↗</a
          >
        </div>
        <div class="map" id="map-left"></div>
      </section>
      <div class="splitter" role="separator" aria-orientation="vertical"></div>
      <section class="pane" data-side="right" aria-label="OpenStreetMap 地図">
        <div class="pane-header">
          <select
            class="pane-title pane-title-select"
            id="right-basemap-select"
            aria-label="右側の地図を切り替え"
          ></select>
          <a
            class="pane-link"
            href="https://www.openstreetmap.org/"
            target="_blank"
            rel="noreferrer noopener"
            >openstreetmap.org ↗</a
          >
        </div>
        <div class="map" id="map-right"></div>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./src/config.js"></script>
    <script src="./src/main.js" defer></script>
  </body>
</html>
